        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
  "/books":
    get:
      tags:
      - Books
      description: |
        Gets all books that fit the search criteria.
        At least one of "searchQuery", "authorId", "subjectId", "placeId", "timeId" or "personId" must be specified.
        If more than one search criteria is specified, only the books that fit all of them are returned.
        Full-text searchable book properties: title.
        The results are paged.
      parameters:
      - $ref: "#/components/parameters/SearchQuery"
      - $ref: "#/components/parameters/SearchMode"
      - name: authorId
        in: query
        required: false
        description: The id of the author that the books must be written by.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: subjectId
        in: query
        required: false
        description: The id of the subjects that the books contents must handle.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: placeId
        in: query
        required: false
        description: The id of the place that the books contents must handle.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: timeId
        in: query
        required: false
        description: The id of the time that the books contents must handle.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: personId
        in: query
        required: false
        description: The id of the person that the books contents must handle.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: sortOrder
        in: query
        required: false
        description: |
          The order in which the books are returned.
          SearchRelevanceDescending may only be used if a searchQuery is specified.
        schema:
          type: string
          enum:
          - TitleAlphabetic
          - TitleReverseAlphabetic
          - SearchRelevanceDescending
          #- FirstPublishDateNewToOld
          #- FirstPublishDateOldToNew
          #- NumberOfAuthorsHighToLow
          #- NumberOfAuthorsLowToHigh
          #- NumberOfEditionsHighToLow
          #- NumberOfEditionsLowToHigh
          maxLength: 128
          default: TitleAlphabetic
      - $ref: "#/components/parameters/PageSize"
      - $ref: "#/components/parameters/ContinuationToken"
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                description: A page of books.
                allOf:
                  - $ref: "#/components/schemas/HalPageLinks"
                  - type: object
                    nullable: false
                    properties:
                      _embedded:
                        type: object
                        nullable: false
                        properties:
                          books:
                            type: array
                            nullable: false
                            items:
                              $ref: "#/components/schemas/Book"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
