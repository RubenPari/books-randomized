openapi: 3.0.1
info:
  title: bookdatabase.io
  version: v1
  termsOfService: https://bookdatabase.io/terms-of-service.html

servers:
  - url: https://api.bookdatabase.io/v1

paths:
  "/authors/{id}":
    get:
      tags:
      - Authors
      description: Gets a single author by their id.
      parameters:
      - name: id
        in: path
        required: true
        description: The id of the author.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No author with the specified id exists
        '500':
          description: Internal server error
  "/authors/random":
    get:
      tags:
      - Authors
      description: Gets a random single author.
      parameters:
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
  "/authors":
    get:
      tags:
      - Authors
      description: |
        Gets all authors that fit the search criteria.
        At least one of "searchQuery", "bookId" or "editionId" must be specified.
        If more than one search criteria is specified, only the authors that fit all of them are returned.
        Full-text searchable author properties: name, alternative names.
        The results are paged.
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/SearchMode"
        - name: bookId
          in: query
          required: false
          description: The id of the book that the authors must be an author of.
          schema:
            $ref: "#/components/schemas/ResourceId"
        - name: editionId
          in: query
          required: false
          description: The id of the edition that the authors must be an author of.
          schema:
            $ref: "#/components/schemas/ResourceId"
        - name: sortOrder
          in: query
          required: false
          description: |
            The order in which the authors are returned.
            SearchRelevanceDescending may only be used if a searchQuery is specified.
          schema:
            type: string
            enum:
            - NameAlphabetic
            - NameReverseAlphabetic
            - SearchRelevanceDescending
            #- NumberOfWorksHighToLow
            #- NumberOfWorksLowToHigh
            #- NumberOfEditionsHighToLow
            #- NumberOfEditionsLowToHigh
            maxLength: 128
            default: NameAlphabetic
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/ContinuationToken"
        - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                description: A page of authors.
                allOf:
                  - $ref: "#/components/schemas/HalPageLinks"
                  - type: object
                    nullable: false
                    properties:
                      _embedded:
                        type: object
                        nullable: false
                        properties:
                          authors:
                            type: array
                            nullable: false
                            items:
                              $ref: "#/components/schemas/Author"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
  "/books/{id}":
    get:
      tags:
      - Books
      description: Gets a single book by its id.
      parameters:
      - name: id
        in: path
        required: true
        description: The id of the book.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No book with the specified id exists
        '500':
          description: Internal server error
  "/books/random":
    get:
      tags:
      - Books
      description: Gets a random single book.
      parameters:
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
