  "/images/{id}/contentUrl":
    get:
      tags:
      - Images
      description: |
        Gets the content URL of an image by its id.
        Every content URL returned is unique and only valid for 5 minutes after this endpoint was called.
      parameters:
      - name: id
        in: path
        required: true
        description: The id of the image.
        schema:
          $ref: "#/components/schemas/ResourceId"
      responses:
        '302':
          description: |
            Success.
            The response is empty and does not contain the image itself. Instead, the "Location" response header contains the URL of the image.
            Every content URL returned is unique and only valid for 5 minutes after this endpoint was called.
          headers:
            Location:
              schema:
                type: string
                maxLength: 2048
                example: https://bookdatabaseprdcus.blob.core.windows.net/images/10e1cd03-9099-ec11-8487-704d7b630b44.jpg?sv=2019-02-02&sr=b&sig=EO6EmOzrKH7zRF05tBE7388RoO26IBcGFwpf1%2FLYyQQ%3D&st=2023-01-08T20%3A47%3A07Z&se=2023-01-08T21%3A07%3A07Z&sp=r
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No image with the specified id is available
        '500':
          description: Internal server error
