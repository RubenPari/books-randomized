  "/editions":
    get:
      tags:
      - Editions
      description: |
        Gets all editions that fit the search criteria.
        At least one of "searchQuery", "isbn", "bookId", "authorId", "genreId", "languageId", "publisherId", "publishPlaceId" must be specified.
        If more than one search criteria is specified, only the editions that fit all of them are returned.
        Full-text searchable author properties: title, alternate titles.
        The results are paged.
      parameters:
      - $ref: "#/components/parameters/SearchQuery"
      - $ref: "#/components/parameters/SearchMode"
      - name: isbn
        in: query
        required: false
        description: |
          The ISBN (ISBN-10 or ISBN-13) that the editions must have.
          Spaces (" "), hyphens (-) and single quotes (') are ignored.
          E.g. "9780825620492" or "082562049X".
        schema:
          type: string
          maxLength: 32
      - name: authorId
        in: query
        required: false
        description: The id of the author that the editions must be written by.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: languageId
        in: query
        required: false
        description: The id of the language that the editions must be written in.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: publisherId
        in: query
        required: false
        description: The id of the publisher that the editions must have been published by.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: publishPlaceId
        in: query
        required: false
        description: The id of the place that the editions must have been published at.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: genreId
        in: query
        required: false
        description: The id of the genre that the editions must belong to.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: bookId
        in: query
        required: false
        description: The id of the book that the editions must be an edition of.
        schema:
          $ref: "#/components/schemas/ResourceId"
      - name: sortOrder
        in: query
        required: false
        description: |
          The order in which the editions are returned.
          SearchRelevanceDescending may only be used if a searchQuery is specified.
        schema:
          type: string
          enum:
          - TitleAlphabetic
          - TitleReverseAlphabetic
          - SearchRelevanceDescending
          #- NumberOfAuthorsHighToLow
          #- NumberOfAuthorsLowToHigh
          #- PublishDateNewToOld
          #- PublishDateOldToNew
          maxLength: 128
          default: TitleAlphabetic
      - $ref: "#/components/parameters/PageSize"
      - $ref: "#/components/parameters/ContinuationToken"
      - $ref: "#/components/parameters/IncludeRelationships"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                description: A page of editions.
                allOf:
                  - $ref: "#/components/schemas/HalPageLinks"
                  - type: object
                    nullable: false
                    properties:
                      _embedded:
                        type: object
                        nullable: false
                        properties:
