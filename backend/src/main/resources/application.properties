spring.application.name=backend

server.port=8080

# Comma-separated browser origins for CORS (e.g. prod URL + dev)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/books_randomized}
spring.datasource.username=${DATABASE_USER:books}
spring.datasource.password=${DATABASE_PASSWORD:books}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.jwt.secret=${JWT_SECRET:dev-jwt-secret-change-me-at-least-32-chars-long}
app.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:30}
app.jwt.refresh-token-days=${JWT_REFRESH_DAYS:14}

app.isbndb.base-url=${ISBNDB_BASE_URL:https://api2.isbndb.com}
app.isbndb.api-key=${ISBNDB_API_KEY:}

app.mailtrap.api-base-url=${MAILTRAP_API_BASE_URL:https://send.api.mailtrap.io/api/send}
app.mailtrap.api-token=${MAILTRAP_API_TOKEN:}
app.mailtrap.from-email=${MAILTRAP_FROM_EMAIL:no-reply@booksrandomized.local}
app.mailtrap.from-name=${MAILTRAP_FROM_NAME:Books Randomized}

app.translator.api-base-url=${TRANSLATE_API_BASE_URL:}
app.translator.api-key=${TRANSLATE_API_KEY:}
